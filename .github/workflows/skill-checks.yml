name: Skill Checks

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  offline-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: build-skills
            command: python skills/build-skills/scripts/check_build_skills.py
          - name: progressive-disclosure
            command: python skills/progressive-disclosure/scripts/check_progressive_disclosure.py
          - name: harness-engineering
            command: python skills/harness-engineering/scripts/check_harness_engineering.py
          - name: release-note-writer
            command: python skills/release-note-writer/scripts/check_release_note_writer.py
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate progressive skill structure
        run: python scripts/check_progressive_skills.py

      - name: Run ${{ matrix.name }} checks
        run: ${{ matrix.command }}

  eval-harness:
    runs-on: ubuntu-latest
    needs: offline-checks
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run minimal eval harness example
        run: python scripts/run_minimal_eval_harness.py
