name: Skill Checks

on:
  push:
    branches:
      - master
      - main
      - "codex/**"
  pull_request:

jobs:
  offline-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: build-skills
            command: python skills/build-skills/scripts/check_build_skills.py
          - name: progressive-disclosure
            command: python skills/progressive-disclosure/scripts/check_progressive_disclosure.py
          - name: harness-engineering
            command: python skills/harness-engineering/scripts/check_harness_engineering.py
          - name: release-note-writer
            command: python skills/release-note-writer/scripts/check_release_note_writer.py
          - name: issue-triage-report
            command: python skills/issue-triage-report/scripts/check_issue_triage_report.py
          - name: api-change-risk-review
            command: python skills/api-change-risk-review/scripts/check_api_change_risk_review.py
          - name: incident-postmortem-writer
            command: python skills/incident-postmortem-writer/scripts/check_incident_postmortem_writer.py
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate progressive skill structure
        run: python scripts/check_progressive_skills.py

      - name: Check documentation links
        run: python scripts/check_docs_links.py

      - name: Check harness prototypes
        run: python scripts/check_harness_prototypes.py

      - name: Run harness runtime example
        run: python scripts/run_harness_runtime.py examples/harness-prototypes/runtime-blueprints/release-note-publication.yaml

      - name: Run ${{ matrix.name }} checks
        run: ${{ matrix.command }}

  eval-harness:
    runs-on: ubuntu-latest
    needs: offline-checks
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run eval harness example
        run: python scripts/run_eval_harness.py --baseline examples/eval-harness/baseline.json
